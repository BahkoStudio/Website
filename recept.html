  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {

      --gold: #C9952A; --gold-lt: #E0B84A;
      --purple: #4A1A6B; --purple-lt: #6B2E96;
      --ivory: #F5F0E5; --cream: #F5F0E5;
      --white: #FEFCF7; --beige: #E8DDD0;
      --charcoal: #1A100E; --mid: #6A5A52;
      --dark: #0E0A08;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Poppins', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--ivory); color: var(--charcoal); font-family: var(--sans); -webkit-font-smoothing: antialiased; overflow-x: hidden; }

    /* ── HEADER ── */
    .site-header { position: sticky; top: 0; z-index: 100; padding: 1.2rem 5vw; display: flex; align-items: center; justify-content: space-between; background: rgba(245,240,229,0.96); backdrop-filter: blur(16px); border-bottom: 1px solid var(--beige); }
    .nav-logo { font-family: var(--serif); font-size: 1.4rem; font-weight: 600; color: var(--charcoal); text-decoration: none; letter-spacing: 0.04em; }
    .back-btn { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; font-weight: 500; color: var(--crimson); text-decoration: none; padding: 0.5rem 1rem; border: 1.5px solid var(--crimson); border-radius: 50px; transition: background 0.2s, color 0.2s; }
    .back-btn:hover { background: var(--crimson); color: var(--ivory); }

    /* ── RECIPE DETAIL ── */
    .recipe-page { max-width: 1080px; margin: 0 auto; padding: 3rem 5vw 5rem; }

    /* Hero */
    .recipe-hero { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin-bottom: 3rem; align-items: start; }
    .recipe-hero-img { border-radius: 16px; overflow: hidden; aspect-ratio: 4/3; }
    .recipe-hero-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .recipe-hero-content { display: flex; flex-direction: column; gap: 1rem; }
    .recipe-badges { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .recipe-badge-tag { font-size: 0.72rem; font-weight: 500; padding: 0.3rem 0.8rem; border-radius: 50px; background: var(--beige); color: var(--mid); text-transform: uppercase; letter-spacing: 0.05em; }
    .recipe-title { font-family: var(--serif); font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 600; line-height: 1.15; color: var(--charcoal); }
    .recipe-desc { font-size: 0.9rem; color: var(--mid); line-height: 1.75; }
    .recipe-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .recipe-meta-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; color: var(--mid); }
    .recipe-meta-item svg { color: var(--crimson); }
    .recipe-meta-item strong { color: var(--charcoal); }

    /* Personal story */
    .recipe-story { background: var(--white); border-left: 3px solid var(--gold); border-radius: 0 12px 12px 0; padding: 1.5rem 2rem; margin-bottom: 2.5rem; }
    .recipe-story p { font-family: var(--serif); font-size: 1.05rem; font-weight: 400; line-height: 1.85; color: var(--charcoal); font-style: italic; }
    .recipe-story p + p { margin-top: 0.75rem; }

    /* Content grid */
    .recipe-content { display: grid; grid-template-columns: 1fr 2.2fr; gap: 2.5rem; align-items: start; margin-bottom: 2.5rem; }
    .recipe-ingredients { background: var(--white); border-radius: 16px; padding: 1.8rem; position: sticky; top: 100px; border: 1px solid var(--beige); border-top: 3px solid var(--crimson); }
    .recipe-instructions { display: flex; flex-direction: column; gap: 2rem; }
    .recipe-instructions-card { background: var(--white); border-radius: 16px; padding: 2rem; border: 1px solid var(--beige); }

    .card-title { font-family: var(--serif); font-size: 1.4rem; font-weight: 600; color: var(--charcoal); margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem; }
    .card-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); }

    .ing-section { margin-bottom: 1.2rem; }
    .ing-section-title { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--crimson); margin-bottom: 0.6rem; }
    .ing-list { list-style: none; }
    .ing-list li { font-size: 0.85rem; color: var(--charcoal); padding: 0.35rem 0; border-bottom: 1px solid var(--beige); display: flex; align-items: center; gap: 0.5rem; }
    .ing-list li::before { content: '·'; color: var(--gold); font-weight: 700; flex-shrink: 0; }
    .ing-list li:last-child { border-bottom: none; }

    .step-section { margin-bottom: 1.5rem; }
    .step-section-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--purple); margin-bottom: 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--beige); }
    .step-list { list-style: none; display: flex; flex-direction: column; gap: 0.8rem; }
    .step-item { display: flex; gap: 0.8rem; align-items: flex-start; }
    .step-num { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, var(--crimson), var(--purple)); color: var(--ivory); font-size: 0.72rem; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .step-text { font-size: 0.88rem; color: var(--charcoal); line-height: 1.65; }

    /* Tips */
    .recipe-tips { background: linear-gradient(135deg, rgba(140,26,38,0.04), rgba(74,26,107,0.04)); border: 1px solid var(--beige); border-radius: 16px; padding: 1.8rem; }
    .tips-list { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
    .tips-list li { font-size: 0.87rem; color: var(--mid); line-height: 1.6; display: flex; gap: 0.6rem; }
    .tips-list li::before { content: '✦'; color: var(--gold); font-size: 0.65rem; margin-top: 0.25rem; flex-shrink: 0; }

    /* Not found */
    .not-found { text-align: center; padding: 8rem 2rem; }
    .not-found h2 { font-family: var(--serif); font-size: 2.5rem; color: var(--charcoal); margin-bottom: 1rem; }
    .not-found p { color: var(--mid); margin-bottom: 2rem; }
    .btn-primary { display: inline-block; padding: 0.8rem 2rem; background: linear-gradient(135deg, var(--crimson), var(--purple)); color: var(--ivory); text-decoration: none; border-radius: 50px; font-size: 0.85rem; font-weight: 500; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.88; }

    @media (max-width: 900px) {
      .recipe-hero { grid-template-columns: 1fr; gap: 1.5rem; }
      .recipe-content { grid-template-columns: 1fr; }
      .recipe-ingredients { position: static; }
    }
    @media (max-width: 600px) {
      .recipe-page { padding: 2rem 4vw 4rem; }
      .recipe-story { padding: 1rem 1.2rem; }
    }
    .lang-toggle { background: transparent; border: 1.5px solid var(--gold); color: var(--gold); font-family: var(--sans); font-size: 0.62rem; font-weight: 600; letter-spacing: 0.12em; padding: 0.32rem 0.7rem; border-radius: 50px; cursor: pointer; transition: background 0.2s, color 0.2s; line-height: 1; }
    .lang-toggle:hover { background: var(--gold); color: var(--dark); }

  'qrimyothe-munkar': {

    title_en: "Qrimyothe – Grandma's Doughnuts 🍩",
    description: 'Mamma berättar om mormors kärlek i varje tugga ♥️ Det här receptet på Qrimyothe är mer än bara ingredienser – det är ett stycke historia från mitt hem, min kultur och framför allt från mitt hjärta.',
    description_en: "Mum tells of grandma's love in every bite ♥️ This Qrimyothe recipe is more than just ingredients – it's a piece of history from my home, my culture and above all from my heart.",

    badges: ['Traditionellt','Bakverk','Assyriskt','Dessert'],
    personalStory: 'Det här receptet på Qrimyothe är mer än bara ingredienser – det är ett stycke historia från mitt hem, min kultur och framför allt från mitt hjärta.\n\nMin mamma har berättat hur mormor brukade baka dessa munkar hemma, särskilt när resurserna var knappa. Med mjöl, vatten, jäst och en nypa socker skapade hon något sött, varmt och älskat av barnen 👌😋.\n\nQrimyothe blev en kär tradition – ett sätt att visa kärlek genom enkelhet. Doften av nygräddade munkar bar med sig barndom, trygghet och omtanke. De påminde oss om att det inte krävs mycket för att ge – bara vilja, kärlek och omtanke 💫\n\nMed det här receptet vill jag bevara hennes minne och föra vidare smaken av våra rötter ❤️.',
    personalStory_en: "This Qrimyothe recipe is more than just ingredients – it is a piece of history from my home, my culture and above all from my heart.\n\nMy mum has told how grandma used to bake these doughnuts at home, especially when resources were scarce. With flour, water, yeast and a pinch of sugar she created something sweet, warm and beloved by the children 👌😋.\n\nQrimyothe became a cherished tradition – a way to show love through simplicity. The smell of freshly baked doughnuts carried childhood, security and care. They reminded us that little is needed to give – just will, love and care 💫\n\nWith this recipe I want to preserve her memory and pass on the taste of our roots ❤️.",
    ingredients: [{section:'Huvudingredienser',section_en:'Main ingredients',items:['7 dl varmt vatten (minst 40°C)','1 paket torrjäst (ca 12 g)','2 msk socker','1 msk salt','16 dl vetemjöl (ca 960 g)','Olja till fritering'],items_en:['7 dl warm water (at least 40°C)','1 packet dry yeast (approx. 12 g)','2 tbsp sugar','1 tbsp salt','16 dl plain flour (approx. 960 g)','Oil for frying']}],
    instructions: [{section:'Förbered degen',section_en:'Prepare the dough',steps:['Häll det varma vattnet i en stor bunke.','Tillsätt socker och torrjäst. Rör om och låt stå i 10 minuter tills det börjar bubbla.','Tillsätt salt och sedan mjölet lite i taget under omrörning.','Knåda degen tills den blir jämn och elastisk – ca 10 min för hand.'],steps_en:['Pour the warm water into a large bowl.','Add sugar and dry yeast. Stir and let stand for 10 minutes until it starts to bubble.','Add salt and then the flour little by little while stirring.','Knead the dough until smooth and elastic – about 10 min by hand.']},{section:'Jäsning',section_en:'Rising',steps:['Täck bunken med plastfolie eller bakduk.','Låt degen jäsa i 1–1,5 timme på en varm plats tills den fördubblats.'],steps_en:['Cover the bowl with cling film or a cloth.','Let the dough rise for 1–1.5 hours in a warm place until doubled.']},{section:'Forma & fritera',section_en:'Shape & fry',steps:['Häll lite olja på händerna, ta små bitar och forma till bollar eller ringar.','Hetta upp olja till ca 180°C i en djup kastrull.','Fritera tills gyllenbruna – vänd för jämn färg. Låt rinna av på papper.'],steps_en:['Pour a little oil on your hands, take small pieces and shape into balls or rings.','Heat oil to about 180°C in a deep saucepan.','Fry until golden brown – turn for even colour. Drain on paper towel.']},{section:'Servering',section_en:'Serving',steps:['Servera som de är eller pudra med florsocker.','Ringla sirap eller servera med glass, hallon och mynta 😍'],steps_en:['Serve as they are or dust with icing sugar.','Drizzle with syrup or serve with ice cream, raspberries and mint 😍']}],
    tips: ['Degen ska vara mjuk – tillsätt mer mjöl om klibbig','Oljans temperatur är avgörande – 180°C ger bäst resultat','Traditionellt med socker eller honung','Förvaras i lufttät behållare 2–3 dagar','Uppvärmda i ugn blir de extra goda'],
    tips_en: ['Dough should be soft – add more flour if sticky','Oil temperature is key – 180°C gives best results','Traditionally served with sugar or honey','Store in an airtight container for 2–3 days','Reheated in the oven they taste extra good']

  'kikarts-tikka-masala': {

const RECIPE_ID = new URLSearchParams(window.location.search).get('id') || window.location.hash.replace('#','');

function render() {
  const id = RECIPE_ID;
  const r = RECIPES[id];
  const container = document.getElementById('recipe-content');
  if (!r) {
    container.innerHTML = `<div class="not-found"><h2>${getT('r.notfound.h')}</h2><p>${getT('r.notfound.p')}</p><a class="btn-primary" href="index.html#recept">${getT('r.notfound.btn')}</a></div>`;
    return;
  }

  const title       = tv(r.title, r.title_en);
  const description = tv(r.description, r.description_en);
  const story       = tv(r.personalStory, r.personalStory_en);
  document.title    = title + ' – MaykasKitchen';

  const storyHtml = story
    ? `<div class="recipe-story">${story.split('\n\n').map(p => `<p>${p}</p>`).join('')}</div>` : '';

  const ingsHtml = r.ingredients.map(s => `
    <div class="ing-section">
      ${s.section ? `<div class="ing-section-title">${tv(s.section, s.section_en)}</div>` : ''}
      <ul class="ing-list">${tv(s.items, s.items_en).map(i => `<li>${i}</li>`).join('')}</ul>
    </div>`).join('');

  const instHtml = r.instructions.map(s => `
    <div class="step-section">
      ${s.section ? `<div class="step-section-title">${tv(s.section, s.section_en)}</div>` : ''}
      <ol class="step-list">${tv(s.steps, s.steps_en).map((st, i) => `<li class="step-item"><span class="step-num">${i+1}</span><span class="step-text">${st}</span></li>`).join('')}</ol>
    </div>`).join('');

  const tips    = tv(r.tips, r.tips_en);
  const tipsHtml = tips ? `
    <div class="recipe-tips">
      <div class="card-title">${getT('r.tips')}</div>
      <ul class="tips-list">${tips.map(t => `<li>${t}</li>`).join('')}</ul>
    </div>` : '';

  container.innerHTML = `
    <div class="recipe-hero">
      <div class="recipe-hero-img"><img src="${r.image}" alt="${title}" loading="eager"></div>
      <div class="recipe-hero-content">
        <div class="recipe-badges">${r.badges.map(b => `<span class="recipe-badge-tag">${b}</span>`).join('')}</div>
        <h1 class="recipe-title">${title}</h1>
        <p class="recipe-desc">${description}</p>
        <div class="recipe-meta">
          <span class="recipe-meta-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            <strong>${r.time} ${getT('r.min')}</strong>
          </span>
          <span class="recipe-meta-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <strong>${r.portions} ${getT('r.portions')}</strong>
          </span>
        </div>
      </div>
    </div>
    ${storyHtml}
    <div class="recipe-content">
      <div class="recipe-ingredients">
        <div class="card-title">${getT('r.ingredients')}</div>
        ${ingsHtml}
      </div>
      <div class="recipe-instructions">
        <div class="recipe-instructions-card">
          <div class="card-title">${getT('r.instructions')}</div>
          ${instHtml}
        </div>
        ${tipsHtml}
      </div>
    </div>`;
}

window.MK_RENDER = render;
render();
initLangToggle();
</script>
